<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    label{
        display: inline-block;
        width: 50px;
       }

    #textarea{
        width: 400px;
        height: 150px;
    }
   /* 2. 내부 스타일 */
    ul{
        padding: 5px;
    }
    </style>

    <!-- 3. 외부 스타일 - 재사용-->
    <!--절대경로/상대경로
         / : 절대경로(프로젝트의 최상위부터 찾아감)
         ./ : 현재위치
         ../ : 상위폴더
    -->
    <link rel="stylesheet" href="/css/style.css">

</head>
<body>

    <form action="loginAction.html">
        <fieldset>
            <h1>예약정보</h1>

            <label for="test1">이름</label>
            <input type="text" name="1" id="test1"><br>
          

            <label for="test2">전화</label>
            <input type="tel" name="2" id="test2"><br>
        

            <label for="test3">이메일</label>
            <input type="email" name="3" id="test3"><br>

    
            <input type="submit" value="예약하기">


        </fieldset>
    </form>
    <hr>

    <form action="loginAction.html">
      <h1>프런트엔드 개발자 지원서</h1>
      <p>CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
      <hr>

      <p><b>개인 정보</b></p>
      <ul>
          <li>
              이름 <input type="text" name="name" id="name" placeholder="공백없이 입력하세요">
          </li>
          <li>
              연락처 <input type="tel" name="연락처">
          </li>
      </ul>

      <p><b>지원 분야</b></p>
      <ul>
          <li class="red">
              <input type="radio" name="field" id="" value="1"> 웹 퍼블리싱
          </li>
          <li class="red">
              <input type="radio" name="field" value="2"> 웹 어플리케이션 개발
          </li>
          <li class="red">
              <input type="radio" name="field" id="" value="3"> 개발 환경 개선
          </li>
      </ul>

      <p><b>지원 동기</b></p>
      <textarea id="textarea" name="지원동기" 
                placeholder="본사 지원 동기를 간략히 써 주세요"></textarea><br>

      <input type="submit" value="접수하기">
      <input type="reset" value="다시 쓰기">
    </form>


   <hr>  






</body>
</html>
