<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="/css/basic.css"> -->
    <style>

        /*구글폰트*/
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Chiron+Hei+HK:ital,wght@0,200..900;1,200..900&display=swap');
        /* 변수 선언 등록
            --변수명 = 값; */
        :root{
            --white : #333;
        }
        .modal-backdrop{
            display: flex;
            justify-content: center; /*주축에 대한 정렬*/
            align-items: center; /*요소가 가지고 있는 영역 차지*/
            position: fixed;
            background-color: hsla(0, 0%, 0%, 0.247);
            inset: 0;
        }

        .modal-box{
            position: relative;
            background-color: var(--white);
            width: 400px;
            padding: 20px;
            border-radius: 20px;
        }

        .modal-box input{
            width: 100%;
        }

        .modal-close{
            position: absolute;
            right: 20px;
            top: 20px;

            border: none;
            background-color: #fff;
            font-size: 2rem;
            color: #666;
        }

        .btn{
            width: 100%;
        }

        /*
        .w-100{
            width: 100%;
        }

        .bc-blue{
            background-color: blue;
        }

        .border-none{
            border: none;
        }

        .h-30px{
            height: 30px;
        }

        .fs-large{
            font-size: 1.2rem;
        }

        .border-radius-8{
            border-radius: 8px;
        } */


        #modalTitle{
            font-family: "Chiron Hei HK", sans-serif;
            font-size: 2rem;
            font-weight: 700;
            font-style: normal;
        }

        #modalContent{
            margin-bottom: 20px;
            color: #666;
        }

        /*세로 마진이 중첩되는 경우, 큰 쪽으로 표현된다*/
        .modal-box h3 .modal-box h6{
            margin: 0px;
        }

        .mb-20{
            margin-bottom: 20px;
        }

        .modal-box input{
            margin: 10px 0px;
            height: 30px;
            font-size: 1.2rem;
            padding-left: 10px;
            border: 1px solid #ccc;
        }

        .show{
        }
    </style>
</head>

<body>
    <!-- 모달을 여는 버튼 -->
    <button id="loginTrigger">로그인</button>

    <!-- 평소엔 숨겨져 있는 백드롭 + 모달 -->
    <!-- class속성을 여러개 적용할 경우, 띄어쓰기를 이용해서 연결 -->
    <div class="modal-backdrop show" id="modalBackdrop">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
            <h3 id="modalTitle">로그인</h3>
            <h6 id="modalContent" class="mb-20">이메일과 비밀번호를 입력하세요</h6>
            <form id="loginForm">
                <label for="email">이메일</label>
                <input type="email" id="email" required>

                <label for="password">비밀번호</label>
                <input type="password" id="password" required>

                <button type="submit" class="btn w-100 border-none h-30px fs-large">로그인</button>
            </form>
        </div>
    </div>
</body>

</html>
