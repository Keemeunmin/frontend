<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레이아웃</title>
    <style>

        *{
            box-sizing: border-box;
            margin: 0px;
        }

        header{
            width: 100%;
            height: 400px;
            background-color: #eee;

        }

        main{
            width: 100%;
            /*vh:창의 높이, vw:창의너비*/
            height: 70vh;
            background-color: bisque;
        }

        footer{
            width: 100%;
            height: 200px;
            background-color: beige;
        }

        .container{
            width: 80%;
            margin: 0 auto;
        }

        .banner{
            height: 70px;
            line-height: 70px;
            background-color: black;
            color: white;
            text-align: center;
            /*rem=16px*/
            font-size: 1.5rem;
            font-weight: 700;
        }

        .flexbox{
            display: flex;
            justify-content: end;
        }
        
        .quickmenu_item{
            width: 100px;
        }

        ul{
            list-style: none;
            color: #333;
        }

        .logo_item{
            text-align: right;
            font-size: 1.2rem;
            height: 100px;
            line-height: 100%;
        }

        .logo_item i{
            padding: 20px 10px;
        }

        .logo_item{
            height: 100px;
            background: url(https://comebello.com/web/upload/NNEditor/20251121/b4e735981bb5574778faf745e3416b9e.png) no-repeat center;
        }
        </style>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container">
        <!--헤더 : 로고 메뉴-->
        <header>
            <div class="banner">🚗당일 배송</div>
            <div class="top_quickmenu">
                <ul class="flexbox">
                    <li class="quickmenu_item">로그인</li>
                    <li class="quickmenu_item">회원가입</li>
                    <li class="quickmenu_item">마이샵</li>
                    <li class="quickmenu_item">커뮤니티</li>
                    <li class="quickmenu_item">
                        KR<img src="https://img.cafe24.com/img/common/global/ko_KR_18x12.png" alt="">
                    </li>
                </ul>
            </div>

            <div class="logo">
                <div class="logo_item">
                    <i class="bi bi-box-arrow-in-left"></i>
                    <i class="bi bi-three-dots"></i>
                    <i class="bi bi-basket2"></i>
                </div>
            </div>
        </header>
        <!--메인 : 서비스 되는 컨텐츠-->
        <main></main>
        <!--footer-->
        <footer></footer>
    </div>
    
</body>
</html>
