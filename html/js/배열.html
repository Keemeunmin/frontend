<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>배열</h1>
    <script>
        // 배열 : 여러개의 데이터를 하나의 변수에 저장
        // 선언 : []을 이용해서 여러개의 값을 나열
        const titles = ["도시의 밤", "파랑의 계절", "스텔라 오디세이"]
        console.log(titles)
        //반복문 안에 있는 요소의 값을 출력하기 위해서 반복문을 이용
        for(let i=0; i<=titles.length-1; i++){
            // 배열의 방의 데이터 읽어오기
            console.log(titles[i]);

        }
        // 배열의 방의 값을 변경하기
        titles[2] = "타짜";
        // 변경된 값 확인
        console.log(titles);

        // 없는 방번호를 입력하면 = undefined
        console.log(titles[4]);

        // new Array()를 사용해서 배열을 만드는 방법 - 굳이 안씀
        const arr1 = [1,2,3]; // 이걸 더 자주 사용
        console.log(arr1)
    </script>
    
</body>
</html>
