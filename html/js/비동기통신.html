<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        console.log(1)
        setTimeout(() => {
            // 시간이 지난 후 실행될 함수 (=콜백함수)
            console.log(2)

            setTimeout(() => {
                console.log(3)

            }, 500);

        }, 1000);

        // 프로미스객체는 만들어지면 콜백함수를 바로 실행 
        // pending (대기중)
        // resolve -> fulfilled 성공적으로 처리됨 
        // reject -> rejected 실패(오류) 처리됨 
        let obj = new Promise((resolve, reject) => {
            // resolve('resolve()호출')
            reject('rejected()호출') // 반환된 값이 them의 매개변수로 들어감
        })
        
        obj
        .them((msg) => {
            console.log('them()', msg)
        })  // --> resolve 상태일 때 실행
        .catch((e) => {
            console.log('catch()', e)
        }) // --> rejected 상태일 때 실행

        // setTimeout(콜백함수, 시간)
        function delay(ms, msg){
            /*
            setTimeout(() => {
                console.log('msg', msg)
            }, ms);
            */

            if(ms < 0){
                throw new Error('시간은 음수를 입력할 수 없습니다')
            }
           return new Promise((resolve, reject) => {
            setTimeout(() => {
                console.log('msg', msg)
                resolve(`${msg} 종료`);
            }, ms)
           })
        }
           
        let promise = delay(1000, '음료 주문')
        promise.then((res) => {
            console.log('res', res);
            return delay(500, '음료 제조')
        })
        .then((res) => {
            delay(1000, '서빙')
        })
        .catch(e => {
            console.log(e);
            console.log('오류 발생');
        });

        // async/await 이용하기 
        function init(){
            
        }
    </script>
</head>
<body>
</body>
</html>
