<body>

    <h1>자바스크립트</h1>

    <!--

        위치

        스크립트가 실행되기 전에 화면에 요소가 그려져야 요소를 선택할 수 있다

    <script>

        // 한줄 주석

        /* 

        여러줄 주석

        */



        // 콘솔창에 출력 -> f12를 하면됨

        console.log("안내", "콘솔창에 출력해봅시다");



        // 선택자를 화면에 있는 요소를 선택하는 방법

        // documnet.querySelector("선택지")

        console.log("body태그 상단", document.querySelector("h1"));



        // 스크립트 실행순서가 중요한 이유

        // 변수 선언 / 변수에 값을 할당 / 타입확인 / + 연산자의 특징

        // 타입확인 / 형변환





        // 변수 선언

        // 변수명 = 값(리터럴);

        // 변수의 타입은 리터럴에 의해서 결정된다 



        // 지정된 값에 따라서 타입이 결정되는 언어

        // 변수 사용 : 변수이름을 불러준다 

        // var, let, const

        // var : 함수단위의 유효범위, 재선언 - 위험, 재할당 가능

        var a = 1; var b = 2; var a = 3;

        // 블록()단위의 스코프, 재선언 불가능, 재할당 가능

        let c = 1; c = 2

        const d = 1; // d=2; <--재할당 불가능



        // 키워드 없이 변수를 만들면 전역변수(어디서나 사용 가능)

        e = "전역변수"



        // 타입을 확인하는 방법

        typeof (a)

        typeof ("테스트") // 문자열의 경우, "" '' 안에 작성해야된다! -> 오류발생



        // 자료형 : 리터럴에 의해 결정

        // 문자열, 숫자, boolean, function, object

        // boolean : 참(true)과 거짓(false)을 나타냄

        // 주로 비교연산자에 의해 나온값(결과)

        // ==, >=, <=. !=

        // === : 타입까지 비교할 때 



        let name = '이름';

        // 화면에 있는 요소를 변수에 저장

        let h1 = document.querySelector("h1");

        // innerText : 요소의 시작태그와 끝태그 사이의 컨텐츠를 변경

        h1.innerText = name;



        /*

        제어문(if/switch) / 반복문(for/while/do-while)

        

        제어문 : 조건에 따라 코드블럭을 실행

        조건식 안에 boolean타입 이므로

        조건문 안에 boolean타입의 값(true, false)을 작성 가능

 

        if(조건문){

         조건이 참이면 실행

        }

 

        if(조건문){

         조건이 참이면 실행

        } else{

         조건이 거짓이면 실행

        }

 

        if(조건문){

         조건이 참이면 실행

        } else if(조건문){

         조건이 참이면 실행

        } else{

         조건이 거짓이면 실행

        }

 

        */





        if (true) {

            console.log("조건문이 참이면 실행")

        }



        if (1 == 2) {

            console.log("조건문이 참이면 실행")

        }



        // 9.0 이상이면 명작

        // 7.0 볼만함

        // 그 외 비추

        /*

       let rating = 9.0;

       if(rating >= 9.0){

         console.log("명작");

       } else if(rating >= 7.0){

         console.log("볼만함")

       } else {

         console.log("비추")

       }

        */





        // prompt(매개변수, 파라메터)

        // pormpt : 웹 브라우저로부터 사용자의 입력을 받아 올때 사용

        // 사용자의 입력값을 반환

        // 반환값을 변수에 저장

        let kor = 90; // prompt('국어시험 점수');

        let eng = 88;

        let avg = (kor + eng) / 2

        console.log(kor);



        /* 

        1. 점수를 학점으로 변환해서 출력

        >= 90 A

        >= 80 B

        >= 70 C

        >= 60 D

  

        2. 조건을 여러개 주는 방법 (논리연산자 && ||)

        평균을 구해서 합격/불합격

           과목별 40 이하는 불합격

           영어시험, 국어시험의 평균이 80 이상이면 합격

        */



        if (kor >= 90) {

            console.log("A");

        } else if (kor >= 80) {

            console.log("B")

        } else if (kor >= 70) {

            console.log("C")

        } else if (kor >= 60) {

            console.log("D")

        } else {

            console.log("F")

        }



        if (kor > 40 && eng > 40 && avg >= 80) {

            console.log(`${avg} 합격`)

        } else {

            console.log(`${avg} 불합격`)

        }



        /*

        3. 삼항 연산자

        조건 ? 참일 때 반환값 : 거짓일 때 반환값

        */

        let res = (kor >= 90) ? "합격" : "불합격";

        console.log(`점수는 ${kor}은 ${res}입니다.`)



        /*

        😄falsy한 값

        조건문에서 데이터가 유효한지 검사할 때 사용

        js 조건문에서 false로 평가 받는 값

        false, 0, "", null, undefinedm NaN

        */



        if(kor){

            console.log("falsy하지 않은 값은 true로 처리돼요")

        }





        // main.js (이어서 작성)

        const movieTitle = "어벤져스";
        const movieGenre = "SF · 액션";
        const movieRating = 8.0;   // null로 바꿔서도 테스트!



        if (movieRating >= 9.0) {
            console.log("명작");
        } else if (movieRating >= 7.0) {
            console.log("볼만함")
        } else {
            console.log("비추")
        }



        const ratingBadge = movieRating ? `⭐ ${movieRating}` : "";

        console.log(`[${movieTitle}] ${ratingBadge}`);
